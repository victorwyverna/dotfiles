- defaults:
    link:
      create: true
      relink: true

- shell:
    - command: test -d "$HOME/.oh-my-zsh/.git" || git clone --depth 1 https://github.com/ohmyzsh/ohmyzsh "$HOME/.oh-my-zsh"
      description: Installing Oh My Zsh
      stdout: true
      stderr: true

- link:
    ~/.zshrc: .zshrc
    ~/.zplugrc: .zplugrc
    ~/.config/shell: shell
    ~/.config/wezterm: .config/wezterm
    ~/.config/zed/settings.json: .config/zed/settings.json
    ~/.config/git/ignore: .config/git/ignore
